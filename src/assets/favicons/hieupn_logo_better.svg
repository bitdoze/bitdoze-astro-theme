<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 240 100" role="img" aria-labelledby="title desc">
<title>hieupn logo</title>
<desc>Gradient wordmark for hieupn using orange to indigo brand colors.</desc>
<defs>
<linearGradient id="hieupnGradient" x1="0%" y1="50%" x2="100%" y2="50%">
<stop offset="0%" stop-color="#f97316"/>
<stop offset="100%" stop-color="#6366f1"/>
</linearGradient>
</defs>
<g transform="translate(10 66) skewX(-10)">
<text x="0" y="0" fill="url(#hieupnGradient)" font-family="Segoe UI, Avenir Next, Arial, sans-serif" font-size="54" font-style="italic" font-weight="800" letter-spacing="-1.5" textLength="210" lengthAdjust="spacingAndGlyphs">hieupn</text>
</g>
</svg>